# [IN]: HTTP requests for H5, Laravel API, and admin panel / H5、Laravel API 与后台 HTTP 请求
# [OUT]: Static files or proxied PHP front-controller responses including storage and large Excel uploads / 静态文件或包含存储文件及大 Excel 上传的 PHP 前端控制器响应
# [POS]: Nginx single-server routing config / Nginx 单机路由配置
# Protocol: When updating me, sync this header + parent folder's .folder.md
# 协议:更新本文件时，同步更新此头注释及所属文件夹的 .folder.md
server {
    listen 80;
    server_name _;
    client_max_body_size 64m;

    root /var/www/frontend;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ^~ /storage/ {
        root /var/www/backend/public;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    location ~ ^/(api|admin|sanctum|up|livewire|livewire-[^/]+|css/filament|js/filament|fonts/filament)(/|$) {
        root /var/www/backend/public;
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    location ~ \.php$ {
        root /var/www/backend/public;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }
}
