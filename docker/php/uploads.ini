; [IN]: PHP-FPM upload and import workload / PHP-FPM 上传与导入工作负载
; [OUT]: Runtime limits for large Excel imports / 大 Excel 导入运行限制
; [POS]: PHP runtime override for import-heavy admin actions / 面向导入型后台操作的 PHP 运行时覆盖
; Protocol: When updating me, sync this header + parent folder's .folder.md
; 协议:更新本文件时，同步更新此头注释及所属文件夹的 .folder.md
upload_max_filesize = 64M
post_max_size = 70M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
