# [IN]: Docker Compose CLI and project source tree / Docker Compose CLI 与项目源码树
# [OUT]: Nginx, PHP-FPM, queue, scheduler, MySQL, and Redis services / Nginx、PHP-FPM、队列、调度器、MySQL 与 Redis 服务
# [POS]: Root deployment orchestration / 根部署编排
# Protocol: When updating me, sync this header + parent folder's .folder.md
# 协议:更新本文件时，同步更新此头注释及所属文件夹的 .folder.md
name: pigeon-racing

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/member-h5/dist:/var/www/frontend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - mysql
      - redis

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/backend
    command: php artisan queue:work --tries=3 --sleep=1
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - app
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/backend
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - app
      - redis

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: pigeon_registration
      MYSQL_USER: pigeon
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root-secret
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

volumes:
  mysql-data:
